<!DOCTYPE html>
<html>

<body>

<h3>Select Folder</h3>

<div id="currentPath">
  My Drive
</div>

<br>

<button onclick="goBack()">
⬅ Back
</button>

<hr>

<div id="folders">
  Loading folders...
</div>

<br>

<button onclick="selectCurrentFolder()">
Select This Folder
</button>


<script>

let currentFolderId = null;

let folderHistory = [];


/**
 * Load root folders when sidebar opens.
 */
google.script.run
  .withSuccessHandler(showFolders)
  .getFolders();



/**
 * Display folders in sidebar.
 */
function showFolders(folders) {

  const div =
    document.getElementById("folders");

  div.innerHTML = "";


  if (folders.length === 0) {

    div.innerHTML =
      "No folders found.";

    return;

  }


  folders.forEach(function(folder) {


    const button =
      document.createElement("button");


    button.textContent =
      "📁 " + folder.name;


    button.style.width =
      "100%";


    button.onclick = function() {


      // Save current location
      folderHistory.push({
        id: currentFolderId,
        name: document
          .getElementById("currentPath")
          .textContent
      });


      currentFolderId =
        folder.id;


      loadFolders(
        folder.id,
        folder.name
      );

    };


    div.appendChild(button);


    div.appendChild(
      document.createElement("br")
    );


  });

}



/**
 * Load folders inside selected folder.
 */
function loadFolders(folderId, folderName) {


  document
    .getElementById("currentPath")
    .textContent =
      folderName;


  google.script.run
    .withSuccessHandler(showFolders)
    .getChildFolders(folderId);

}



/**
 * Return to previous folder.
 */
function goBack() {


  if (folderHistory.length === 0) {

    return;

  }


  const previous =
    folderHistory.pop();


  currentFolderId =
    previous.id;


  document
    .getElementById("currentPath")
    .textContent =
      previous.name;


  if (currentFolderId) {


    google.script.run
      .withSuccessHandler(showFolders)
      .getChildFolders(currentFolderId);


  } else {


    google.script.run
      .withSuccessHandler(showFolders)
      .getFolders();


  }

}



/**
 * Save selected folder.
 */
function selectCurrentFolder() {


  if (!currentFolderId) {

    alert(
      "Please choose a folder first."
    );

    return;

  }


  google.script.run
    .withSuccessHandler(function() {

      alert(
        "Folder selected."
      );

    })
    .saveFolder(currentFolderId);


}


</script>


</body>

</html>
